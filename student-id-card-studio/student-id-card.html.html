window.CLOUDINARY_CONFIG = { cloudName:'dbqqvmkss', uploadPreset:'Student-ID-Card', folder:'school-id-cards/students' };

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, doc, getDocs, deleteDoc, writeBatch, setDoc, getDoc, updateDoc, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  const firebaseConfig = {
  apiKey:"AIzaSyCKjBisAbjBrqLgMiIGVrXipypvpL1BLFw",
  authDomain:"id-card-studio-coex.firebaseapp.com",
  projectId:"id-card-studio-coex",
  storageBucket:"id-card-studio-coex.firebasestorage.app",
  messagingSenderId:"560739605567",
  appId:"1:560739605567:web:5ddc295d98c1627a732c8a"
};
  window.uploadToCloudinary = async function(dataUrl, folder) {
    const cfg = window.CLOUDINARY_CONFIG;
    if (!cfg.cloudName || cfg.cloudName === 'YOUR_CLOUD_NAME') throw new Error('Cloudinary not configured.');
    const res = await fetch(dataUrl);
    const blob = await res.blob();
    const fd = new FormData();
    fd.append('file', blob); fd.append('upload_preset', cfg.uploadPreset);
    if (folder || cfg.folder) fd.append('folder', folder || cfg.folder);
    const uploadRes = await fetch(`https://api.cloudinary.com/v1_1/${cfg.cloudName}/image/upload`,{ method:'POST', body:fd });
    if (!uploadRes.ok) { const err = await uploadRes.json().catch(()=>({})); throw new Error('Cloudinary upload failed: ' + (err.error?.message || uploadRes.status)); }
    const data = await uploadRes.json(); return data.secure_url;
  };
  window.compressImage = (dataUrl, maxW=800, maxH=1050, quality=0.72) => new Promise(res => {
    if (!dataUrl) return res(dataUrl);
    const img = new Image();
    img.onload = () => {
      const ratio = Math.min(maxW/img.width, maxH/img.height, 1);
      const w = Math.round(img.width*ratio), h = Math.round(img.height*ratio);
      const cv = document.createElement('canvas'); cv.width=w; cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      res(cv.toDataURL('image/jpeg', quality));
    };
    img.onerror = () => res(dataUrl); img.src = dataUrl;
  });
  const IS_CONFIGURED = firebaseConfig.apiKey && !firebaseConfig.apiKey.startsWith('YOUR_');
  window._fbConfigured = IS_CONFIGURED;
  if (!IS_CONFIGURED) { window._fbReady = false; document.dispatchEvent(new Event('fbNotConfigured')); }
  else {
    const init = async () => {
      try {
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const TPL_COL = "templates";
        const colPath = (schoolId, session) =>
          `schools/${encodeURIComponent(schoolId)}/sessions/${encodeURIComponent(session)}/students`;
        window.fbSave = async (students, schoolId, session) => {
          const cp = colPath(schoolId, session);
          const BS = 400;
          for (let i = 0; i < students.length; i += BS) {
            const b = writeBatch(db);
            students.slice(i,i+BS).forEach(s => {
              const id = (s.STUDENT_CODE||s.ROLL_NO||s.NAME||Math.random().toString(36).slice(2)).replace(/[^\w]/g,'_');
              b.set(doc(db, cp, id), {
                NAME:s.NAME||'', CLASS:s.CLASS||'', SEC:s.SEC||'', ROLL_NO:s.ROLL_NO||'',
                DOB:s.DOB||'', FATHERS_NAME:s.FATHERS_NAME||'', PHONE_NO:s.PHONE_NO||'',
                STUDENT_CODE:s.STUDENT_CODE||'', ADDRESS:s.ADDRESS||'',
                SESSION:session||s.SESSION||'', SCHOOL_ID:schoolId||'',
                PHOTO:s.PHOTO||'', updatedAt:Date.now()
              });
            });
            await b.commit();
          }
        };
        window.fbSaveOneStudent = async (student, schoolId, session) => {
          const cp = colPath(schoolId, session);
          const id = (student.STUDENT_CODE||student.ROLL_NO||student.NAME||Math.random().toString(36).slice(2)).replace(/[^\w]/g,'_');
          await setDoc(doc(db, cp, id), {
            NAME:student.NAME||'', CLASS:student.CLASS||'', SEC:student.SEC||'',
            ROLL_NO:student.ROLL_NO||'', DOB:student.DOB||'', FATHERS_NAME:student.FATHERS_NAME||'',
            PHONE_NO:student.PHONE_NO||'', STUDENT_CODE:student.STUDENT_CODE||'',
            ADDRESS:student.ADDRESS||'', SESSION:session||student.SESSION||'',
            SCHOOL_ID:schoolId||'', PHOTO:student.PHOTO||'', updatedAt:Date.now()
          }, { merge:true });
        };
        window.fbLoad = async (schoolId, session) => {
          const cp = colPath(schoolId, session);
          const snap = await getDocs(collection(db, cp));
          return snap.docs.map(d=>d.data());
        };
        window.fbClear = async (schoolId, session) => {
          const cp = colPath(schoolId, session);
          const snap = await getDocs(collection(db, cp));
          const BS=400; const docs=snap.docs;
          for(let i=0;i<docs.length;i+=BS){const b=writeBatch(db);docs.slice(i,i+BS).forEach(d=>b.delete(d.ref));await b.commit();}
        };
        window.fbDelete = async (id, schoolId, session) => {
          const cp = colPath(schoolId, session);
          await deleteDoc(doc(db, cp, id.replace(/[^\w]/g,'_')));
        };
        window.fbSaveTemplates = async (templates, schoolId) => {
          const b=writeBatch(db);
          const base = schoolId ? `schools/${encodeURIComponent(schoolId)}/templates` : TPL_COL;
          templates.forEach(t=>{
            const id=t.id.replace(/[^\w]/g,'_');
            b.set(doc(db, base, id),{id:t.id,name:t.name,image:t.image,schoolId:schoolId||'',updatedAt:Date.now()});
          });
          await b.commit();
        };
        window.fbLoadTemplates = async (schoolId) => {
          const base = schoolId ? `schools/${encodeURIComponent(schoolId)}/templates` : TPL_COL;
          const snap=await getDocs(collection(db, base));
          return snap.docs.map(d=>d.data());
        };
        window.fbDeleteTemplate = async (id, schoolId) => {
          const base = schoolId ? `schools/${encodeURIComponent(schoolId)}/templates` : TPL_COL;
          await deleteDoc(doc(db, base, id.replace(/[^\w]/g,'_')));
        };
        window.fbSaveSchools = async (schools) => {
          const b=writeBatch(db);
          schools.forEach(s=>{
            const id=s.id.replace(/[^\w]/g,'_');
            b.set(doc(db,'schools',id),{id:s.id,name:s.name,sessions:s.sessions||[],updatedAt:Date.now()},{merge:true});
          });
          await b.commit();
        };
       window.fbLoadSchools = async (adminEmail) => {
  if(adminEmail){
    const q = query(collection(db,'schools'), where('adminEmail','==',adminEmail));
    const snap = await getDocs(q);
    if(!snap.empty) return snap.docs.map(d=>d.data());
  }
  return [];
};
        window.fbSaveOneSchool = async (school) => {
  const id = school.id.replace(/[^\w]/g,'_');
  await setDoc(doc(db,'schools',id),{
    id:school.id, name:school.name, sessions:school.sessions||[],
    adminEmail: school.adminEmail||'',
    line2: school.line2||'', line3: school.line3||'', line4: school.line4||'',
    updatedAt:Date.now()
  },{merge:true});
};
        window.fbSaveSchoolCfg = async (schoolId, cfg, templateId) => {
          const id = (templateId ? `${schoolId}__TPL__${templateId}` : schoolId).replace(/[^\w]/g,'_');
          const safe={};
          Object.keys(cfg).forEach(k=>{
            const v=cfg[k];
            if(typeof v==='string' && v.startsWith('data:') && v.length > 900000){
              console.warn('Skipping oversized base64 field:', k, 'size:', v.length);
              safe[k]=null;
            } else {
              safe[k]=v;
            }
          });
          await setDoc(doc(db,'schoolSettings',id),{schoolId,cfg:safe,updatedAt:Date.now()},{merge:true});
        };
        window.fbLoadSchoolCfg = async (schoolId, templateId) => {
          const id = (templateId ? `${schoolId}__TPL__${templateId}` : schoolId).replace(/[^\w]/g,'_');
          const snap=await getDoc(doc(db,'schoolSettings',id));
          if(snap.exists())return snap.data().cfg||null;
          return null;
        };
        window.fbVerifyStudent = async (studentCode, schoolId, session) => {
          if (!studentCode) return null;
          const cp = colPath(schoolId, session);
          const snap = await getDocs(collection(db, cp));
          const docs = snap.docs.map(d => d.data());
          return docs.find(d =>
            d.STUDENT_CODE === studentCode ||
            d.STUDENT_CODE === studentCode.replace(/[^\w]/g,'_') ||
            d.ROLL_NO === studentCode
          ) || null;
        };
        window._fbReady = true; document.dispatchEvent(new Event('fbReady'));
      } catch(e) { console.error('Firebase init error:',e); window._fbReady=false; window._fbInitError=e.message; document.dispatchEvent(new CustomEvent('fbError',{detail:e.message})); }
    };
    init();
  }
</script>

const loadedFonts=new Set(['Barlow','Barlow Condensed','Bebas Neue','Oswald','Raleway','Nunito','Poppins','Anton','Russo One','Exo 2']);
function ensureFontLoaded(fontValue){
  const name=fontValue.replace(/['"]/g,'').split(',')[0].trim();
  if(loadedFonts.has(name))return;loadedFonts.add(name);
  const slug=name.replace(/\s+/g,'+');
  const link=document.createElement('link');link.rel='stylesheet';
  link.href=`https://fonts.googleapis.com/css2?family=${slug}:wght@400;700&display=swap`;
  document.head.appendChild(link);
}

function showToast(msg,type='i'){
  const c=document.getElementById('toast-root');
  const el=document.createElement('div');el.className=`toast ${type}`;
  const ic={s:'✓',e:'✗',w:'⚠',i:'ℹ'}[type]||'ℹ';
  el.innerHTML=`<span style="font-size:13px">${ic}</span><span>${msg}</span>`;
  el.style.pointerEvents='all';c.appendChild(el);
  setTimeout(()=>{el.style.animation='tin .3s reverse';setTimeout(()=>el.remove(),280)},3200);
}

function normKey(k){

    STUDENTCODE:'STUDENT_CODE',CODE:'STUDENT_CODE',ADMNO:'STUDENT_CODE',
    ADDRESS:'ADDRESS',ADDR:'ADDRESS',PHOTO:'PHOTO',IMAGE:'PHOTO',IMG:'PHOTO',
    SESSION:'SESSION',SES:'SESSION',SESS:'SESSION'};
  return m[u]||u;
}
function mapRow(row){
  const norm={};Object.keys(row).forEach(k=>{norm[normKey(k)]=String(row[k]??'').trim();});
  const fields=['NAME','CLASS','SEC','ROLL_NO','DOB','FATHERS_NAME','PHONE_NO','STUDENT_CODE','ADDRESS','SESSION','PHOTO'];
  const out={};fields.forEach(f=>{out[f]=norm[f]||'';});return out;
}

const QRCodeEl=memo(function QRCodeEl({verifyUrl,size=80,scale=1,bgWhite=true,show=true,showCodeText=false,studentCode=''}){
  const ref=useRef();
  const rawSize=Math.max(64,Math.round(size));
  useEffect(()=>{
    if(!ref.current||!show||!verifyUrl)return;
    ref.current.innerHTML='';
    try{new QRCode(ref.current,{text:verifyUrl,width:rawSize,height:rawSize,colorDark:'#000000',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.H});}

function FontSelect({value,onChange,previewText}){

function SliderWithArrows({label,valKey,val,min,max,step=1,unit='',set,arrowStep}){
  const aStep=arrowStep||step;
  const clamp=v=>Math.min(max,Math.max(min,parseFloat((+v).toFixed(step<1?2:0))));
  return(
    <div style={{marginBottom:4}} onClick={e=>e.stopPropagation()}>
      <div style={{display:'flex',alignItems:'center',gap:3,marginBottom:2}}>
        <span style={{fontSize:'8.5px',color:'var(--tx2)',fontWeight:700,textTransform:'uppercase',minWidth:46,letterSpacing:'.3px',flexShrink:0}}>{label}</span>
        <button className="arr-btn" onClick={e=>{e.stopPropagation();set(valKey,clamp(val-aStep));}}>◀</button>
        <button className="arr-btn" onClick={e=>{e.stopPropagation();set(valKey,clamp(val+aStep));}}>▶</button>
        <button className="arr-btn rst" onClick={e=>{e.stopPropagation();set(valKey,0);}}>↺</button>
        <span style={{fontSize:'8.5px',color:'var(--blue)',fontWeight:700,marginLeft:2,minWidth:30,textAlign:'right'}}>{val}{unit}</span>
      </div>
      <input type="range" min={min} max={max} step={step} value={val} onChange={e=>{e.stopPropagation();set(valKey,parseFloat(e.target.value));}} onClick={e=>e.stopPropagation()} style={{width:'100%',accentColor:'var(--blue)',height:3,cursor:'pointer'}}/>
    </div>
  );
}

        <button className="arr-btn rst" onClick={e=>{e.stopPropagation();if(onReset)onReset();else{set(xKey,0);set(yKey,0);}}}>↺</button>

function BulkPhotoUpload({students,onPhotosUploaded,fbOk,activeSchool,activeSession}){
  const [uploading,setUploading]=useState(false);
  const [progress,setProgress]=useState({done:0,total:0});
  const [mappings,setMappings]=useState({});
  const fileInputRef=useRef();
  const cloudinaryReady=window.CLOUDINARY_CONFIG.cloudName&&window.CLOUDINARY_CONFIG.cloudName!=='YOUR_CLOUD_NAME';
  const handleFilesSelected=async(files)=>{
    const newMappings={...mappings};
    for(const f of Array.from(files)){
      const nameWithoutExt=f.name.replace(/\.(jpg|jpeg|png|gif|webp)$/i,'');
      const matchedStudent=students.find(s=>s.STUDENT_CODE&&(s.STUDENT_CODE.toLowerCase()===nameWithoutExt.toLowerCase()||s.STUDENT_CODE.replace(/[^a-z0-9]/gi,'').toLowerCase()===nameWithoutExt.replace(/[^a-z0-9]/gi,'').toLowerCase()));
      const preview=await new Promise((res)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.readAsDataURL(f);});
      const key=matchedStudent?matchedStudent.STUDENT_CODE:nameWithoutExt;
      newMappings[key]={file:f,preview,matched:!!matchedStudent,studentName:matchedStudent?.NAME||'Unknown',fileName:nameWithoutExt};
    }
    setMappings(newMappings);
  };
  const handleUploadAll=async()=>{
    const keys=Object.keys(mappings);if(!keys.length)return;
    setUploading(true);setProgress({done:0,total:keys.length});
    const results={};let done=0;
    for(const code of keys){
      const{preview,matched}=mappings[code];
      if(!matched){done++;setProgress({done,total:keys.length});continue;}
      try{let photoUrl=preview;if(cloudinaryReady){const folder=`${window.CLOUDINARY_CONFIG.folder}/photos`;photoUrl=await window.uploadToCloudinary(preview,folder);}results[code]=photoUrl;}
      catch(e){console.warn('Upload failed for',code,e);results[code]=preview;}
      done++;setProgress({done,total:keys.length});
    }
    const updatedStudents=students.map(s=>{const photoUrl=results[s.STUDENT_CODE];if(photoUrl)return{...s,PHOTO:photoUrl};return s;});
    if(fbOk&&window.fbSaveOneStudent){for(const s of updatedStudents.filter(s=>results[s.STUDENT_CODE])){try{await window.fbSaveOneStudent(s,activeSchool,activeSession);}catch(e){console.warn(e);}}showToast(`${Object.keys(results).length} photos uploaded & saved to Firebase ☁️`,'s');}
    onPhotosUploaded(updatedStudents);setUploading(false);setMappings({});showToast(`✅ ${done}/${keys.length} photos processed`,'s');
  };
  const removeMapping=(code)=>{const n={...mappings};delete n[code];setMappings(n);};
  return(
    <div className="photo-upload-section">
      <div className="photo-upload-title"><span>📸</span><span>Bulk Photo Upload</span><span style={{marginLeft:'auto',fontSize:9,color:'var(--tx2)',fontWeight:600,textTransform:'none'}}>Name files as StudentCode.jpg</span></div>
      <div className="bulk-photo-upload-zone" onDragOver={e=>{e.preventDefault();}} onDrop={e=>{e.preventDefault();handleFilesSelected(e.dataTransfer.files);}} onClick={()=>fileInputRef.current.click()}>
        <div style={{fontSize:26,marginBottom:4}}>📁</div>
        <div style={{fontSize:11,fontWeight:700,color:'var(--navy)'}}>Drop photos or click to browse</div>
        <div style={{fontSize:9,color:'var(--tx2)',marginTop:3}}>Name files as <strong>StudentCode.jpg</strong></div>
        <input ref={fileInputRef} type="file" accept="image/*" multiple style={{display:'none'}} onChange={e=>handleFilesSelected(e.target.files)}/>
      </div>
      {Object.keys(mappings).length>0&&(<>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
          <div style={{fontSize:10,fontWeight:700,color:'var(--navy)'}}>{Object.keys(mappings).length} photo(s) ready</div>
          <div style={{display:'flex',gap:5}}><button className="btn btn-red btn-xs" onClick={()=>setMappings({})}>✕ Clear All</button><button className="btn btn-grn btn-sm" onClick={handleUploadAll} disabled={uploading}>{uploading?`Uploading ${progress.done}/${progress.total}…`:`☁️ Upload All`}</button></div>
        </div>
        {uploading&&(<div style={{height:5,background:'#dbeafe',borderRadius:3,marginBottom:8,overflow:'hidden'}}><div style={{height:'100%',background:'var(--blue2)',borderRadius:3,transition:'width .4s',width:`${(progress.done/progress.total)*100}%`}}/></div>)}
        <div className="photo-drop-grid">
          {Object.entries(mappings).map(([code,{preview,matched,studentName}])=>(
            <div key={code} className={`photo-drop-item${matched?' has-photo':''}`}>
              <button onClick={()=>removeMapping(code)} style={{position:'absolute',top:2,right:2,background:'rgba(239,68,68,.8)',color:'#fff',border:'none',borderRadius:'50%',width:14,height:14,cursor:'pointer',fontSize:8,display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1}}>✕</button>
              <img src={preview} alt={code}/><div className="pdi-code" title={code}>{code}</div>
              <div className="pdi-name" title={studentName}>{matched?`✓ ${studentName}`:`⚠ No match`}</div>
            </div>
          ))}
        </div>
      </>)}
    </div>
  );
}

      document.addEventListener('fbNotConfigured',onNC,{once:true});

          <SbSec title="Name Position & Font" icon="📍">

        {designTab==='fields'&&(<div>
          <SbSec title="All Fields (Global)" icon="📦">

                <button className="arr-btn" onClick={()=>set('globalFieldFontSize',Math.min(24,+((cfg.globalFieldFontSize||FIXED_TEXT_SIZE)+0.5).toFixed(1)))}>▲</button>

              <input type="range" min={5} max={24} step={0.5} value={cfg.globalFieldFontSize||FIXED_TEXT_SIZE} onChange={e=>set('globalFieldFontSize',parseFloat(e.target.value))} style={{width:'100%',accentColor:'var(--navy)',height:4,cursor:'pointer'}}/>
            </div>
            <span className="sb-lbl">Global Fields Font</span>
            <FontSelect value={cfg.fieldFont||ALL_FONTS[0].v} onChange={v=>set('fieldFont',v)} previewText="Father : Rajesh Kumar"/>
            <XYBlock label="Fields Block Position" xKey="fieldsX" yKey="fieldsY" xVal={cfg.fieldsX||0} yVal={cfg.fieldsY||0} min={-300} max={300} set={set}/>
          </SbSec>
          <SbSec title="Session" icon={cfg.sessionEmoji||'📅'}>
            <div className="sb-row"><label>Show Row</label><label className="tog"><input type="checkbox" checked={cfg.showSession!==false} onChange={e=>set('showSession',e.target.checked)}/><span className="tog-sl"/></label></div>
            <div className="sb-row"><label>Between Photo+Name</label><label className="tog"><input type="checkbox" checked={cfg.sessionBetween!==false} onChange={e=>set('sessionBetween',e.target.checked)}/><span className="tog-sl"/></label></div>
            <EmojiBlock emojiKey="sessionEmoji" sizeKey="sessionEmojiSize" xKey="sessionEmojiX" yKey="sessionEmojiY" showKey="showSessionEmoji" cfg={cfg} set={set} defaultEmoji="📅"/>
            <div style={{marginBottom:5}}><span className="sb-lbl">Label Text</span><input type="text" value={cfg.sessionLabel||'Session'} onChange={e=>set('sessionLabel',e.target.value)} style={{width:'100%',border:'1px solid var(--bdr2)',borderRadius:4,padding:'4px 6px',fontSize:10,outline:'none',fontFamily:'Barlow,sans-serif'}}/></div>
            <FieldAdjBlock label="Session Row" xKey="sessionX" yKey="sessionY" sizeKey="sessionFontSize" spacingKey="sessionSpacing" fontKey="sessionFont" cfg={cfg} set={set} defaultSize={cfg.globalFieldFontSize||FIXED_TEXT_SIZE}/>
          </SbSec>
          <SbSec title="Class / Sec / Roll" icon={cfg.classEmoji||'🎓'}>
            <EmojiBlock emojiKey="classEmoji" sizeKey="classEmojiSize" xKey="classEmojiX" yKey="classEmojiY" showKey="showClassEmoji" cfg={cfg} set={set} defaultEmoji="🎓"/>
            <FieldAdjBlock label="Whole Row" xKey="classX" yKey="classY" sizeKey="classFontSize" spacingKey="classSpacing" fontKey="classFont" cfg={cfg} set={set} defaultSize={cfg.globalFieldFontSize||FIXED_TEXT_SIZE}/>
            <div style={{background:'#f0f9ff',border:'1px solid #bae6fd',borderRadius:5,padding:'6px 8px',marginTop:4}}>
              <div style={{fontSize:8.5,fontWeight:800,color:'#0369a1',marginBottom:5,textTransform:'uppercase'}}>Separate Items Position</div>
              {[['CLASS item','classItemX','classItemY'],['SEC item','secItemX','secItemY'],['ROLL item','rollItemX','rollItemY']].map(([lbl,xk,yk])=>(<div key={lbl}><div style={{fontSize:8,fontWeight:700,color:'var(--navy)',marginBottom:3,marginTop:4}}>{lbl}</div><XYBlock xKey={xk} yKey={yk} xVal={cfg[xk]||0} yVal={cfg[yk]||0} min={-100} max={100} set={set} onReset={()=>{set(xk,0);set(yk,0);}}/></div>))}

          <SbSec title="QR Code" icon="▦">
            <div className="sb-row"><label>Show QR</label><label className="tog"><input type="checkbox" checked={cfg.showBarcode!==false} onChange={e=>set('showBarcode',e.target.checked)}/><span className="tog-sl"/></label></div>
            <div className="sb-row"><label>White BG</label><label className="tog"><input type="checkbox" checked={cfg.qrBgWhite!==false} onChange={e=>set('qrBgWhite',e.target.checked)}/><span className="tog-sl"/></label></div>
            <div className="sb-row"><label>Show Code</label><label className="tog"><input type="checkbox" checked={!!cfg.showQrCodeText} onChange={e=>set('showQrCodeText',e.target.checked)}/><span className="tog-sl"/></label></div>
            <SliderWithArrows label="QR Size" valKey="qrSize" val={cfg.qrSize||80} min={16} max={160} step={1} set={set} unit="px"/>
            <div className="sb-row"><label>Position</label><select value={cfg.qrPosition||'bottom-right'} onChange={e=>set('qrPosition',e.target.value)}><option value="bottom-right">Bottom Right</option><option value="bottom-left">Bottom Left</option><option value="bottom-center">Bottom Center</option></select></div>
            <XYBlock label="Fine-tune" xKey="qrX" yKey="qrY" xVal={cfg.qrX||0} yVal={cfg.qrY||0} min={-300} max={300} set={set}/>
          </SbSec>

        {designTab==='assets'&&(<div>

            <input ref={wmRef} type="file" accept="image/*" style={{display:'none'}} onChange={async e=>{if(e.target.files[0])set('watermark',await readImg(e.target.files[0]));}}/>

          </SbSec>
          <SbSec title="School Stamp" icon="🔖">
            <div className="up-btn" onClick={()=>stampRef.current.click()}>{cfg.stamp?<><img src={cfg.stamp} className="up-thumb" alt=""/><span>Change Stamp</span></>:<><span>🔖</span><span>Upload Stamp (PNG)</span></>}</div>
            <input ref={stampRef} type="file" accept="image/*" style={{display:'none'}} onChange={async e=>{if(e.target.files[0])set('stamp',await readImg(e.target.files[0]));}}/>
            {cfg.stamp&&<><button className="btn btn-red btn-sm" style={{width:'100%',marginBottom:5}} onClick={()=>set('stamp',null)}>✕ Remove</button><div className="sb-row"><label>Show</label><label className="tog"><input type="checkbox" checked={!!cfg.showStamp} onChange={e=>set('showStamp',e.target.checked)}/><span className="tog-sl"/></label></div><SliderWithArrows label="Opacity" valKey="stampOpacity" val={+(cfg.stampOpacity||.18).toFixed(2)} min={0.05} max={0.9} step={0.01} set={set}/><SliderWithArrows label="Size" valKey="stampSize" val={cfg.stampSize||55} min={30} max={200} step={5} set={set} unit="px"/></>}
          </SbSec>
          <SbSec title="Principal Signature" icon="✍️">
            <div className="up-btn" onClick={()=>sigRef.current.click()}>{cfg.signature?<><img src={cfg.signature} style={{height:16,objectFit:'contain',maxWidth:48}} alt=""/><span>Change Sig ✓</span></>:<><span>✍️</span><span>Upload Signature</span></>}</div>
            <input ref={sigRef} type="file" accept="image/*" style={{display:'none'}} onChange={async e=>{if(e.target.files[0])set('signature',await readImg(e.target.files[0]));}}/>
            {cfg.signature&&<>
              <div style={{textAlign:'center',background:'#f5f5f0',padding:5,borderRadius:5,marginBottom:5}}><img src={cfg.signature} style={{maxHeight:26,objectFit:'contain'}} alt=""/></div>
              <button className="btn btn-red btn-sm" style={{width:'100%',marginBottom:6}} onClick={()=>set('signature',null)}>✕ Remove</button>
              <SeparateXYControl label="Signature Block" xKey="signatureX" yKey="signatureY" xVal={cfg.signatureX||0} yVal={cfg.signatureY||0} min={-200} max={200} set={set} color="#065f46"/>
              <SeparateXYControl label="Image Offset" xKey="signatureImgX" yKey="signatureImgY" xVal={cfg.signatureImgX||0} yVal={cfg.signatureImgY||0} min={-80} max={80} set={set} color="var(--purple)"/>
              <div style={{background:'#f0f9ff',border:'1px solid #bae6fd',borderRadius:5,padding:6,marginTop:4}}>
                <div style={{fontSize:8.5,fontWeight:800,color:'#0369a1',marginBottom:5}}>Image Size</div>
                <SliderWithArrows label="Height" valKey="signatureHeight" val={cfg.signatureHeight||20} min={10} max={60} set={set} unit="px"/>
                <SliderWithArrows label="Width" valKey="signatureWidth" val={cfg.signatureWidth||50} min={28} max={120} set={set} unit="px"/>
              </div>
              <div style={{background:'#f5f3ff',border:'1px solid #ddd6fe',borderRadius:5,padding:6,marginTop:4}}>
                <div style={{fontSize:8.5,fontWeight:800,color:'var(--purple)',marginBottom:5}}>Principal Text</div>
                <SeparateXYControl label="Text Position" xKey="signatureTxtX" yKey="signatureTxtY" xVal={cfg.signatureTxtX||0} yVal={cfg.signatureTxtY||0} min={-80} max={80} set={set} color="var(--purple)"/>
                <SliderWithArrows label="Font Size" valKey="signatureTxtSize" val={cfg.signatureTxtSize||5.5} min={4} max={14} step={0.5} set={set} unit="px"/>
                <SliderWithArrows label="Line Height" valKey="signatureTxtHeight" val={cfg.signatureTxtHeight||14} min={8} max={40} set={set} unit="px"/>
              </div>
            </>}
          </SbSec>
        </div>)}

        {designTab==='print'&&(
          <SbSec title="Print Options" icon="🖨️">
            <div className="sb-row"><label>Mode</label><select value={cfg.printMode||'color'} onChange={e=>set('printMode',e.target.value)}><option value="color">Color</option><option value="bw">B&W</option></select></div>

            <span className="sb-lbl">Worker URL</span>
            <input type="text" placeholder="https://your-worker.workers.dev" value={cfg.cfWorkerUrl||''} onChange={e=>set('cfWorkerUrl',e.target.value.trim())} style={{width:'100%',border:'1px solid var(--bdr2)',borderRadius:4,padding:'5px 8px',fontSize:10,outline:'none',fontFamily:'Barlow,sans-serif',marginBottom:6}}/>
            <div className="sb-row" style={{marginBottom:6}}><label>Short QR URL</label><label className="tog"><input type="checkbox" checked={!!cfg.useShortQrUrl} onChange={e=>set('useShortQrUrl',e.target.checked)}/><span className="tog-sl"/></label></div>
          </SbSec>
          <SbSec title="Firebase Status" icon="🔥">
            <div style={{fontSize:9,lineHeight:1.8}}>
              <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:4}}><div className={`fb-dot ${fbDotClass}`} style={{width:8,height:8}}/><span style={{fontWeight:700,color:fbStatusColor}}>{fbStatusLabel}</span></div>
              {fbError&&<div style={{color:'var(--red)',fontSize:8,background:'#fef2f2',border:'1px solid #fca5a5',borderRadius:4,padding:'4px 7px',marginBottom:4,wordBreak:'break-word'}}>{fbError}</div>}
              {fbOk&&<div style={{fontSize:8.5,color:'var(--grn)',fontWeight:700}}>{currentSchool?.name} · {activeSession} · {fbCount} students</div>}
            </div>
          </SbSec>
        </div>)}
      </div>
    </div>
  );

  const cardAdjSidebar=adjStudent?(
    <CardAdjSidebar student={adjStudent} cfgOverride={getCardOverride(adjStudent)} globalCfg={stableCfg} templateImage={activeTemplateImage}
      onChangeCfg={over=>setCardOverride(adjStudent,over)}
      onClose={()=>setAdjStudent(null)}
      onApplyAsDefault={()=>{const merged={...cfg,...getCardOverride(adjStudent)};setSchoolCfgs(prev=>({...prev,[activeSchool]:merged}));resetCardOverride(adjStudent);showToast('Applied as default','s');}}
      onResetOverride={()=>{resetCardOverride(adjStudent);showToast('Card overrides reset','s');}}/>
  ):null;

  if(showSetup){return(<SchoolManagerModal schools={schools} onDone={handleSetupDone} onSave={saveSchools} fbOk={fbOk} initialMode='select'/>);}

  return(
    <div className="app">
      <header className="app-hdr no-print">
        <div className="brand"><div className="brand-logo">🎓</div><div><h1>STUDENT ID Card Studio</h1><p>Portrait 5.5×8.5cm · QR Verify · Firebase</p></div></div>
        <nav className="hdr-nav">{[['upload','📤','Upload'],['students','👥','Students'],['designer','🎨','Designer'],['preview','🖨️','Print']].map(([k,ic,lbl])=>(<button key={k} className={`nav-btn${tab===k?' active':''}`} onClick={()=>setTab(k)}>{ic} {lbl}</button>))}</nav>
        <div className="hdr-right">
          {students.length>0&&<span style={{fontSize:10,color:'rgba(255,255,255,.65)',fontWeight:700}}>{filtered.length}/{students.length}</span>}

          {filtered.length>0&&<><button className="btn btn-gold btn-sm" onClick={handlePrint}>🖨 Print</button><button className="btn btn-gold btn-sm" onClick={exportPDF}>📄 PDF</button></>}
          {students.length>0&&<button className="btn btn-grn btn-sm" onClick={downloadExcel}>📊 Excel</button>}

          {schools.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
        </select>
        <span style={{fontSize:9,color:'rgba(255,255,255,.4)',fontWeight:700}}>📅</span>
        <select className="ctx-sel" value={activeSession||''} onChange={e=>{const ses=e.target.value;setActiveSession(ses);setStudents([]);setCardOverrides({});if(activeSchool)loadSchoolData(activeSchool,ses);}}>
          {(schools.find(s=>s.id===activeSchool)?.sessions||[]).map(s=><option key={s} value={s}>{s}</option>)}
        </select>
        <span style={{fontSize:8,color:'rgba(255,255,255,.4)',marginLeft:4}}>|</span>
        <button className="ctx-btn" onClick={()=>setShowSetup(true)}>⚙ Schools</button>
        <div style={{marginLeft:'auto',display:'flex',gap:6,alignItems:'center'}}>
          <div className={`fb-dot ${fbDotClass}`}/>
          <span style={{fontSize:9,color:fbStatusColor,fontWeight:700}}>FB: {fbStatusLabel}</span>
          {fbOk&&<span style={{fontSize:9,color:'rgba(255,255,255,.45)',fontWeight:600}}>{fbCount} students</span>}
          {cloudinaryConfigured&&<span className="ctx-badge">🌤️ CDN</span>}
        </div>
        <div className="fb-acts">
          {students.length>0&&<button className="fb-btn fb-g" onClick={handleSaveFB} disabled={isSaving||!fbOk}>{isSaving?'Saving…':'☁️ Save'}</button>}
          <button className="fb-btn fb-b" onClick={handleLoadFB} disabled={isLoadFB||!fbOk}>{isLoadFB?'Loading…':'📥 Load'}</button>
          {fbOk&&fbCount>0&&<button className="fb-btn fb-r" onClick={()=>setShowClearCloud(true)}>🗑</button>}
        </div>
      </div>

      <div className="app-body">
        {sidebar}
        <div className="main">
          <div className="content">

            {tab==='upload'&&(<div>
              <div className="page-title">School ID Card Generator</div>
              <div className="page-sub">School: <strong>{currentSchool?.name||'—'}</strong> · Session: <strong>{activeSession||'—'}</strong></div>

<script>
window._adminEmail='';
window._singleSchoolMode=false;
window.addEventListener('message',function(e){
  if(e.data&&e.data.type==='setAdminEmail'){
    const newEmail=e.data.email||'';
    // Ignore duplicate messages with same email
    if(window._adminEmail===newEmail&&window._adminEmailReady)return;
    window._adminEmail=newEmail;
    window._adminEmailReady=true;
    window._singleSchoolMode=e.data.singleSchoolMode===true;
    const tryLoad=()=>{
      if(window.fbLoadSchools&&window._fbReady){
        window.fbLoadSchools(window._adminEmail).then(function(schools){
          // Fix any existing schools missing adminEmail
          if(window.fbSaveOneSchool&&schools&&schools.length){
            schools.forEach(function(s){
              if(!s.adminEmail&&window._adminEmail){
                window.fbSaveOneSchool({...s,adminEmail:window._adminEmail}).catch(()=>{});
              }
            });
          }
          document.dispatchEvent(new CustomEvent('adminEmailReady',{
            detail:{email:window._adminEmail,schools:schools||[],singleSchoolMode:window._singleSchoolMode}
          }));
        });
      } else {
        setTimeout(tryLoad,400);
      }
    };
    tryLoad();
  }
});
</script>
